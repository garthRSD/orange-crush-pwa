<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ff6900">
  <meta name="background-color" content="#171717">

  <title>Orange Crush</title>

  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Orange Crush">

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #171717;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #f2f2f2;
    }

    #setup {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      place-items: center;
      padding: 24px;
      background: #171717;
      color: white;
      text-align: center;
    }

    #setup.show {
      display: grid;
    }

    .setup-card {
      max-width: 520px;
    }

    .setup-card img {
      width: 128px;
      height: 128px;
      border-radius: 28px;
    }

    .setup-card code {
      display: block;
      margin-top: 18px;
      padding: 12px;
      border-radius: 10px;
      background: #2b2b2b;
      color: #ffd2b2;
      text-align: left;
      overflow-wrap: anywhere;
    }
  </style>
</head>

<body>
  <iframe
    id="app-frame"
    title="Orange Crush"
    allow="clipboard-write"
    referrerpolicy="strict-origin-when-cross-origin">
  </iframe>

  <section id="setup">
    <div class="setup-card">
      <img src="./icons/icon-192.png" alt="Orange Crush">
      <h1>Connect the Orange Crush web app</h1>
      <p>
        Open <strong>index.html</strong> and replace the placeholder URL
        with your deployed Apps Script web-app URL.
      </p>
      <code>https://script.google.com/macros/s/AKfycbyoX8Cv9cwcUBf23tq6JPh6VP89sLCAAr49MKPYC9F3BmAlMYXdigPO9qCEs1RGGgmHIw/exec</code>
    </div>
  </section>

  <script>
    const APPS_SCRIPT_URL = 'PASTE_APPS_SCRIPT_WEB_APP_URL_HERE';

    const frame = document.getElementById('app-frame');
    const setup = document.getElementById('setup');

    if (APPS_SCRIPT_URL.includes('PASTE_APPS_SCRIPT')) {
      setup.classList.add('show');
    } else {
      frame.src = APPS_SCRIPT_URL;
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</body>
</html>
